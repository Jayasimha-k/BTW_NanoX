<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreThermal | Energy Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #00d2ff;
            --danger: #ff416c;
            --success: #2ecc71;
            --bg: #0f172a;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar for Logs */
        .sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .log-container {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 10px;
        }

        .log-entry {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            animation: fadeIn 0.5s ease;
        }

        /* Main Dashboard */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto 1fr;
            gap: 20px;
            overflow-y: auto;
        }

        .card {
            background: var(--glass);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .full-width { grid-column: span 2; }

        canvas#heatmap {
            width: 100% !important;
            height: 280px !important;
            image-rendering: auto; /* Smoothes the 8x8 pixels */
            border-radius: 12px;
            background: #000;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn-control {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .on { background: var(--accent); color: #000; }
        .off { background: var(--danger); color: #fff; }
        .btn-control:hover { opacity: 0.8; transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .toolbar {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            align-items: end;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pill {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status-ok { color: var(--success); }
        .status-bad { color: var(--danger); }
        .input, .select, .button {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
        }
        .button { cursor: pointer; }
        .range {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3><i class="fas fa-microchip"></i> System Logs</h3>
        <p style="font-size: 0.8rem; color: var(--accent);">Monitoring Active...</p>
        <div class="log-container" id="logBox">
            <div class="log-entry">Booting Energy Core...</div>
        </div>
    </div>

    <div class="main-content">
        <div class="card toolbar">
            <div class="field">
                <label>Mode</label>
                <div>
                    <span id="modePill" class="pill">Mode: -</span>
                    <span id="ledPill" class="pill" style="margin-left:8px">LED: -</span>
                    <span id="connPill" class="pill" style="margin-left:8px">Status: -</span>
                </div>
            </div>
            <div class="field">
                <label>Threshold & Interval</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
                    <div>
                        <input id="threshold" class="range" type="range" min="25" max="45" step="0.5" />
                        <div style="font-size:0.85rem">Alert at <span id="thVal"></span> °C</div>
                    </div>
                    <div>
                        <input id="interval" class="range" type="range" min="250" max="3000" step="250" />
                        <div style="font-size:0.85rem">Update every <span id="intVal"></span> ms</div>
                    </div>
                    <button class="button" id="resetBtn" style="grid-column: span 2">Reset Savings</button>
                </div>
            </div>
        </div>
        <div class="card">
            <h3 style="margin-top:0"><i class="fas fa-fire"></i> Thermal Hotspots</h3>
            <canvas id="heatmap" width="8" height="8"></canvas>
        </div>

        <div class="card">
            <h3 style="margin-top:0"><i class="fas fa-sliders"></i> Management</h3>
            <div class="stat-grid">
                <div class="stat-box">
                    <small style="color: #64748b;">AVG TEMP</small>
                    <div id="avgTemp" style="font-size: 1.8rem; font-weight: bold; color: var(--accent);">--°C</div>
                </div>
                <div class="stat-box">
                    <small style="color: #64748b;">EST. SAVINGS</small>
                    <div id="savings" style="font-size: 1.5rem; font-weight: bold; color: var(--success);">0.000 kWh</div>
                </div>
            </div>
            <button class="btn-control on" onclick="sendCmd('on')">Switch ON</button>
            <button class="btn-control off" onclick="sendCmd('off')">Emergency OFF</button>
        </div>

        <div class="card full-width">
            <h3 style="margin-top:0"><i class="fas fa-chart-area"></i> Efficiency Timeline</h3>
            <canvas id="trendChart" height="100"></canvas>
        </div>
    </div>

    <script>
        const IP = window.location.origin;
        let totalSaved = 0;
        const logBox = document.getElementById('logBox');
        let threshold = 34;
        let intervalMs = 1000;
        let timerId = null;

        // Setup Chart.js
        const ctx = document.getElementById('trendChart').getContext('2d');
        const trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Device Temp (°C)',
                    data: [],
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: true,
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { ticks: { color: '#94a3b8' } }
                },
                plugins: { legend: { labels: { color: 'white' } } }
            }
        });

        async function updateData() {
            try {
                const res = await fetch(`${IP}/data`);
                const data = await res.json();
                setConnStatus(true);
                const avg = data.pixels.reduce((a, b) => a + b) / 64;
                renderHeatmap(data.pixels);
                updateUI(avg, data.led);
                updateHistory(avg);
                detectAnomaly(avg);
            } catch (err) {
                setConnStatus(false);
            }
        }

        function renderHeatmap(pixels) {
            const canvas = document.getElementById('heatmap');
            const ctx = canvas.getContext('2d');
            const img = ctx.createImageData(8, 8);
            for (let i = 0; i < pixels.length; i++) {
                const temp = pixels[i];
                const ratio = Math.min(Math.max((temp - 22) / 12, 0), 1);
                const idx = i * 4;
                img.data[idx] = ratio * 255;         // Red
                img.data[idx+1] = (1 - ratio) * 50;  // Green
                img.data[idx+2] = (1 - ratio) * 255; // Blue
                img.data[idx+3] = 255;               // Alpha
            }
            ctx.putImageData(img, 0, 0);
        }

        function updateUI(avg, isLedOn) {
            document.getElementById('avgTemp').innerText = `${avg.toFixed(1)}°C`;
            if(!isLedOn) {
                totalSaved += (9 / 3600000); // Simulated 9W savings per sec
                document.getElementById('savings').innerText = `${totalSaved.toFixed(4)} kWh`;
            }
            document.getElementById('ledPill').textContent = `LED: ${isLedOn ? 'ON' : 'OFF'}`;
        }

        function detectAnomaly(avg) {
            if(avg > threshold) {
                const entry = document.createElement('div');
                entry.className = "log-entry";
                entry.style.borderLeft = "3px solid var(--danger)";
                entry.innerHTML = `<b style="color:var(--danger)">ALERT:</b> High Heat (${avg.toFixed(1)}°C)`;
                logBox.prepend(entry);
                if(logBox.childNodes.length > 10) logBox.removeChild(logBox.lastChild);
            }
        }

        function updateHistory(val) {
            if(trendChart.data.labels.length > 15) {
                trendChart.data.labels.shift();
                trendChart.data.datasets[0].data.shift();
            }
            trendChart.data.labels.push(new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'}));
            trendChart.data.datasets[0].data.push(val);
            trendChart.update('none'); // Update without animation for performance
        }

        function sendCmd(state) {
            fetch(`${IP}/control?state=${state}`).then(r=>r.json()).then(j=>{
                document.getElementById('ledPill').textContent = `LED: ${j.led ? 'ON' : 'OFF'}`;
            }).catch(e => alert("Device unreachable"));
        }

        function setConnStatus(ok) {
            const pill = document.getElementById('connPill');
            pill.textContent = `Status: ${ok ? 'OK' : 'Error'}`;
            pill.className = `pill ${ok ? 'status-ok' : 'status-bad'}`;
        }

        function restartPolling() {
            if (timerId) clearInterval(timerId);
            timerId = setInterval(updateData, intervalMs);
        }

        async function refreshMode() {
            try {
                const r = await fetch(`${IP}/mode`);
                const j = await r.json();
                const m = j.mode === 'device' ? `Device` : `Simulator`;
                document.getElementById('modePill').textContent = `Mode: ${m}`;
            } catch {}
        }

        function initControls() {
            const th = document.getElementById('threshold');
            const tv = document.getElementById('thVal');
            const iv = document.getElementById('interval');
            const ivv = document.getElementById('intVal');
            th.value = threshold;
            tv.textContent = threshold.toFixed(1);
            iv.value = intervalMs;
            ivv.textContent = intervalMs;
            th.addEventListener('input', e => {
                threshold = Number(e.target.value);
                tv.textContent = threshold.toFixed(1);
            });
            iv.addEventListener('input', e => {
                intervalMs = Number(e.target.value);
                ivv.textContent = intervalMs;
                restartPolling();
            });
            document.getElementById('resetBtn').addEventListener('click', () => {
                totalSaved = 0;
                document.getElementById('savings').innerText = `0.000 kWh`;
            });
        }

        initControls();
        refreshMode();
        restartPolling();
    </script>
</body>
</html>
